<!DOCTYPE html>
<html>
<head>
    <title>AI Image Generator</title>
</head>
<body>
    <h1>AI Image Generator</h1>
    <form method="post">
        <input type="text" name="prompt" placeholder="Enter a prompt...">
        <button type="submit">Generate Images</button>
    </form>
    
    {% if images %}
    <div>
        {% for image in images %}
        <img src="data:image/png;base64,{{ image }}" style="width:500px;">
        {% endfor %}
    </div>
    {% endif %}
</body>
</html>
